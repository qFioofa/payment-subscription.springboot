spring:
  application:
    name: obligations
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/obligations}
    username: ${DB_USER:app}
    password: ${DB_PASSWORD:app}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    locations: ${FLYWAY_LOCATIONS:filesystem:../database/migration}
  jackson:
    property-naming-strategy: SNAKE_CASE

springdoc:
  swagger-ui:
    path: /docs

server:
  port: 8080
